<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ise Okhiria — Portfolio</title>
  <meta name="description" content="Ise Okhiria — Software Development Engineer. A retro personal-computer portfolio.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="monitor">
    <div class="nameplate">
      <span class="logo">MICRO&mdash;OKHIRIA 2000</span>
      <span class="led">PWR <b></b></span>
    </div>

    <div class="screen">
      <div class="desktop" id="desktop">

        <div class="saver float" id="saver"><span aria-hidden="true">ISE</span><span aria-hidden="true">OKHIRIA</span><span class="sub" aria-hidden="true">- software engineer -</span><button class="startpc" id="startpc">Start</button></div>

        <div class="icons">
          <button class="icon" data-win="w-about"><svg class="ico" viewBox="0 0 24 24" shape-rendering="crispEdges" aria-hidden="true"><rect x="8" y="4" width="8" height="8" fill="#1fa56d" stroke="#3a2231" stroke-width="1.6"/><rect x="4" y="14" width="16" height="8" fill="#ffb3d9" stroke="#3a2231" stroke-width="1.6"/></svg><span class="lbl">About Me</span></button>
          <button class="icon" data-win="w-exp"><svg class="ico" viewBox="0 0 24 24" shape-rendering="crispEdges" aria-hidden="true"><path d="M3 6 h6 l2 2 h10 v12 h-18 z" fill="#ff9dcb" stroke="#3a2231" stroke-width="1.6"/></svg><span class="lbl">Experience</span></button>
          <button class="icon" data-win="w-proj"><svg class="ico" viewBox="0 0 24 24" shape-rendering="crispEdges" aria-hidden="true"><rect x="3" y="3" width="18" height="18" fill="#ffb3d9" stroke="#3a2231" stroke-width="1.6"/><rect x="7" y="3" width="10" height="7" fill="#3a2231"/><rect x="9" y="4" width="3" height="5" fill="#fff6fb"/><rect x="7" y="13" width="10" height="6" fill="#fff6fb"/></svg><span class="lbl">Projects</span></button>
          <button class="icon" data-win="w-skills"><svg class="ico" viewBox="0 0 24 24" shape-rendering="crispEdges" aria-hidden="true"><rect x="3" y="5" width="18" height="14" fill="#57ffb0" stroke="#3a2231" stroke-width="1.6"/><rect x="6" y="9" width="8" height="1.8" fill="#3a2231"/><rect x="6" y="13" width="5" height="1.8" fill="#3a2231"/></svg><span class="lbl">Skills</span></button>
          <button class="icon" data-win="w-int"><svg class="ico" viewBox="0 0 24 24" shape-rendering="crispEdges" aria-hidden="true"><path d="M12 2 l3 6 6 1 -4.5 4.5 1 6 -5.5 -3 -5.5 3 1 -6 -4.5 -4.5 6 -1 z" fill="#57ffb0" stroke="#3a2231" stroke-width="1.4"/></svg><span class="lbl">Interests</span></button>
          <button class="icon" data-win="w-games"><svg class="ico" viewBox="0 0 24 24" shape-rendering="crispEdges" aria-hidden="true"><rect x="4" y="12" width="16" height="8" rx="1" fill="#ff9dcb" stroke="#3a2231" stroke-width="1.6"/><rect x="11" y="4" width="2" height="8" fill="#3a2231"/><circle cx="12" cy="4" r="2.5" fill="#e0609f" stroke="#3a2231" stroke-width="1.4"/></svg><span class="lbl">Games</span></button>
          <button class="icon" id="term-icon"><svg class="ico" viewBox="0 0 24 24" shape-rendering="crispEdges" aria-hidden="true"><rect x="3" y="4" width="18" height="15" fill="#1a1220" stroke="#3a2231" stroke-width="1.6"/><rect x="6" y="9" width="5" height="1.8" fill="#57ffb0"/><rect x="12" y="9" width="2" height="1.8" fill="#ff9dcb"/><rect x="6" y="13" width="8" height="1.8" fill="#1fa56d"/></svg><span class="lbl">Terminal</span></button>
        </div>

        <!-- windows (bodies filled by JS from content object) -->
        <section class="win out" id="w-about" data-title="AboutMe.txt" hidden role="dialog" aria-label="About me">
          <div class="win__bar"><span class="t">AboutMe.txt</span><span class="win__btns"><button class="out mn" aria-label="Minimize">_</button><button class="out cl" aria-label="Close">X</button></span></div>
          <div class="win__body" id="b-about"></div>
        </section>
        <section class="win out wide" id="w-exp" data-title="Experience.log" hidden role="dialog" aria-label="Experience">
          <div class="win__bar"><span class="t">Experience.log</span><span class="win__btns"><button class="out mn" aria-label="Minimize">_</button><button class="out cl" aria-label="Close">X</button></span></div>
          <div class="win__body" id="b-exp"></div>
        </section>
        <section class="win out wide" id="w-proj" data-title="Projects" hidden role="dialog" aria-label="Projects">
          <div class="win__bar"><span class="t">Projects</span><span class="win__btns"><button class="out mn" aria-label="Minimize">_</button><button class="out cl" aria-label="Close">X</button></span></div>
          <div class="win__body" id="b-proj"></div>
        </section>
        <section class="win out" id="w-skills" data-title="Skills.dat" hidden role="dialog" aria-label="Skills">
          <div class="win__bar"><span class="t">Skills.dat</span><span class="win__btns"><button class="out mn" aria-label="Minimize">_</button><button class="out cl" aria-label="Close">X</button></span></div>
          <div class="win__body" id="b-skills"></div>
        </section>
        <section class="win out" id="w-int" data-title="Interests.cfg" hidden role="dialog" aria-label="Interests">
          <div class="win__bar"><span class="t">Interests.cfg</span><span class="win__btns"><button class="out mn" aria-label="Minimize">_</button><button class="out cl" aria-label="Close">X</button></span></div>
          <div class="win__body" id="b-int"></div>
        </section>
        <section class="win out" id="w-games" data-title="Games" hidden role="dialog" aria-label="Games">
          <div class="win__bar"><span class="t">Games</span><span class="win__btns"><button class="out mn" aria-label="Minimize">_</button><button class="out cl" aria-label="Close">X</button></span></div>
          <div class="win__body">
            <div class="games">
              <div class="game-hud"><span>SNAKE</span><span id="snake-score">SCORE 0</span></div>
              <canvas id="snake" width="150" height="150" aria-label="Snake game"></canvas>
              <p class="hint">Arrow keys or WASD to move</p>
              <button class="game-btn" id="snake-start">Start</button>
            </div>
          </div>
        </section>

        <div class="taskbar">
          <button class="start out" id="startbtn" aria-expanded="false" aria-haspopup="true"><span class="sq"></span>Menu</button>
          <div class="tasks" id="tasks"></div>
          <span class="clock in" id="clock">--:--</span>
        </div>

        <div class="startmenu out" id="startmenu" hidden role="menu" aria-label="Programs">
          <div class="side">OKHIRIA</div>
          <div class="list">
            <button class="mi" role="menuitem" data-win="w-about"><svg class="ico" viewBox="0 0 24 24" shape-rendering="crispEdges" aria-hidden="true"><rect x="8" y="4" width="8" height="8" fill="#1fa56d" stroke="#3a2231" stroke-width="1.6"/><rect x="4" y="14" width="16" height="8" fill="#ffb3d9" stroke="#3a2231" stroke-width="1.6"/></svg>About Me</button>
            <button class="mi" role="menuitem" data-win="w-exp"><svg class="ico" viewBox="0 0 24 24" shape-rendering="crispEdges" aria-hidden="true"><path d="M3 6 h6 l2 2 h10 v12 h-18 z" fill="#ff9dcb" stroke="#3a2231" stroke-width="1.6"/></svg>Experience</button>
            <button class="mi" role="menuitem" data-win="w-proj"><svg class="ico" viewBox="0 0 24 24" shape-rendering="crispEdges" aria-hidden="true"><rect x="3" y="3" width="18" height="18" fill="#ffb3d9" stroke="#3a2231" stroke-width="1.6"/><rect x="7" y="3" width="10" height="7" fill="#3a2231"/></svg>Projects</button>
            <button class="mi" role="menuitem" data-win="w-skills"><svg class="ico" viewBox="0 0 24 24" shape-rendering="crispEdges" aria-hidden="true"><rect x="3" y="5" width="18" height="14" fill="#57ffb0" stroke="#3a2231" stroke-width="1.6"/></svg>Skills</button>
            <button class="mi" role="menuitem" data-win="w-int"><svg class="ico" viewBox="0 0 24 24" shape-rendering="crispEdges" aria-hidden="true"><path d="M12 2 l3 6 6 1 -4.5 4.5 1 6 -5.5 -3 -5.5 3 1 -6 -4.5 -4.5 6 -1 z" fill="#57ffb0" stroke="#3a2231" stroke-width="1.4"/></svg>Interests</button>
            <span class="mi div" aria-hidden="true"></span>
            <button class="mi" role="menuitem" data-win="w-games"><svg class="ico" viewBox="0 0 24 24" shape-rendering="crispEdges" aria-hidden="true"><rect x="4" y="12" width="16" height="8" rx="1" fill="#ff9dcb" stroke="#3a2231" stroke-width="1.6"/><circle cx="12" cy="4" r="2.5" fill="#e0609f" stroke="#3a2231" stroke-width="1.4"/></svg>Games</button>
            <button class="mi" role="menuitem" id="mi-term"><svg class="ico" viewBox="0 0 24 24" shape-rendering="crispEdges" aria-hidden="true"><rect x="3" y="4" width="18" height="15" fill="#1a1220" stroke="#3a2231" stroke-width="1.6"/><rect x="6" y="9" width="5" height="1.8" fill="#57ffb0"/></svg>Terminal</button>
          </div>
        </div>

        <!-- terminal overlay (landing) -->
        <div id="terminal" class="off" role="region" aria-label="Terminal">
          <div id="term-window">
            <div id="term-bar"><span class="tt">guest@okhiria: ~</span><button class="term-x" id="term-exit" aria-label="Exit terminal to desktop" title="Exit to desktop">X</button></div>
            <div id="term-scroll" tabindex="0"><div id="term-out"></div></div>
            <nav id="term-cmdbar" aria-label="Jump to section">
              <span class="lead">GO&gt;</span>
              <button class="cmdbtn" data-go="sec-about">About</button>
              <button class="cmdbtn" data-go="sec-exp">Experience</button>
              <button class="cmdbtn" data-go="sec-proj">Projects</button>
              <button class="cmdbtn" data-go="sec-skills">Skills</button>
              <button class="cmdbtn" data-go="sec-int">Interests</button>
              <button class="cmdbtn" data-go="sec-contact">Contact</button>
              <button class="cmdbtn go" id="cmd-startx">Desktop &raquo;</button>
            </nav>
          </div>
        </div>

      </div>
    </div>
  </div>
  <script src="app.js" defer></script>
</body>
</html>
